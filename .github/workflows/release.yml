name: release
# Publishes to npm via OIDC trusted publishing — no NPM_TOKEN secret anywhere.
# npmjs.com must list this exact workflow (basaltbytes/odoo-agentic-dev,
# release.yml) as the package's trusted publisher; the registry then accepts
# the runner's OIDC identity and generates provenance attestations itself.
on:
  push:
    tags: ["v*"]
  # manual fallback: publishes whatever version the chosen ref carries
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: release
  cancel-in-progress: false
permissions:
  id-token: write # OIDC exchange with the npm registry
  contents: write # GitHub Release creation
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Tag must match package.json
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      # prepublishOnly runs the full gate (lint, typecheck, build, test);
      # --no-git-checks because a tag checkout is a detached HEAD.
      # NPM_CONFIG_PROVENANCE: provenance attestations live in a PUBLIC
      # transparency log, so npm/pnpm only emit them for a public source repo.
      # While this repo is private, pnpm logs "ERR_PNPM_PROVENANCE_INSUFFICIENT
      # _INFORMATION ... determine visibility" and skips (a WARN, not a failure).
      # The flag is left on so provenance turns on automatically if the repo is
      # ever made public — no workflow change needed.
      - run: pnpm publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: "true"
      - name: GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
